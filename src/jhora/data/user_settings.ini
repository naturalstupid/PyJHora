[meta]
config_version = 1

[general]
language = English
include_uranus_to_pluto = false
use_24hour_format_in_to_dms = true

[location]
database_engine = SQLITE
check_database_for_world_cities = false
get_place_elevation_from_internet = false

[calculation]
default_ayanamsa_mode = TRUE_PUSHYA
dhasa_year_duration_default = TRUE_SIDEREAL_YEAR
savana_year_method_default = PROSPECTIVE_0_to_360_JHORA
true_lunar_year_method_default = TITHI_AT_DOB
bhaava_madhya_method = 1
tamil_month_method = 3
use_planet_speed_for_panchangam_end_timings = true

[charts]
include_special_and_arudha_lagna_in_charts = true
include_maandhi_in_charts = true
include_charts_only_for_western_type = false

